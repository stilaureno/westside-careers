<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root{
      --primary:#163a70;
      --primary-dark:#102c55;
      --primary-soft:#1f4d94;
      --accent:#d4af37;
      --text:#eef4ff;
      --muted:#b7c6df;
      --input-bg:#0e1d34;
      --card-shadow:0 18px 42px rgba(4,12,24,.34);
      --success-bg:rgba(22,101,52,.18);
      --success-line:rgba(74,222,128,.40);
      --error-bg:rgba(153,27,27,.18);
      --error-line:rgba(248,113,113,.35);
      --info-bg:rgba(21,44,80,.92);
      --info-line:rgba(212,175,55,.24);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(46,102,184,.22), transparent 28%),
        linear-gradient(180deg,#08111f 0%, #0d1a2f 26%, #10213b 58%, #0a1424 100%);
      color:var(--text);
    }

    .wrap{max-width:1180px;margin:auto;padding:20px}

    .hero,.card{
      border-radius:22px;
      box-shadow:var(--card-shadow);
      overflow:hidden;
    }

    .hero{
      margin-bottom:18px;
      border:1px solid rgba(212,175,55,.22);
      background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      position:relative;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(212,175,55,.06), transparent 22%, transparent 78%, rgba(212,175,55,.04)),
        radial-gradient(circle at top right, rgba(22,58,112,.06), transparent 24%);
      pointer-events:none;
    }

    .hero-inner{padding:30px 28px;position:relative;z-index:1}

    .card{
      padding:22px;
      margin-bottom:18px;
      background:linear-gradient(180deg, rgba(23,46,81,.96) 0%, rgba(13,28,50,.98) 100%);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(4px);
    }

    h1,h2,h3{margin:0 0 10px}
    h1{
      font-size:30px;
      color:#163a70;
      letter-spacing:.2px;
      text-shadow:none;
    }
    h2{font-size:20px;color:#ffffff}
    h3{font-size:16px;color:#ffffff}

    .muted{font-size:13px;color:#5f6f86;line-height:1.65}

    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .full{grid-column:1/-1}

    .field label{
      display:block;
      font-size:12px;
      color:#d8e3f4;
      margin:0 0 6px;
      letter-spacing:.15px;
    }

    input,select,button{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      transition:.2s ease;
    }

    input,select{
      border:1px solid rgba(255,255,255,.12);
      background:var(--input-bg);
      color:var(--text);
    }

    input::placeholder{color:#8da3c7}

    input:focus,select:focus{
      outline:none;
      border-color:rgba(212,175,55,.55);
      box-shadow:0 0 0 4px rgba(212,175,55,.12);
    }

    button{
      border:none;
      background:linear-gradient(180deg, var(--primary-soft) 0%, var(--primary) 100%);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{
      background:linear-gradient(180deg,#2458a7 0%, #17396d 100%);
      transform:translateY(-1px)
    }
    button[disabled]{opacity:.75;cursor:not-allowed;transform:none}

    .secondary-btn{
      background:linear-gradient(180deg,#1f3963 0%, #162d4f 100%);
      border:1px solid rgba(212,175,55,.18);
    }

    .message{
      padding:16px;
      border-radius:14px;
      margin-top:14px;
      line-height:1.65;
      white-space:pre-wrap
    }
    .success{background:var(--success-bg);border:1px solid var(--success-line);color:#c7f9d3}
    .error{background:var(--error-bg);border:1px solid var(--error-line);color:#ffd2d2}
    .info{background:var(--info-bg);border:1px solid var(--info-line);color:var(--text)}
    .hidden{display:none!important}

    .section-title{
      padding-bottom:8px;
      border-bottom:1px solid rgba(255,255,255,.10);
      margin-bottom:14px;
    }

    .check-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin-top:8px
    }

    .check-item{
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:12px;
      background:rgba(9,21,39,.55);
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--text);
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(212,175,55,.12);
      border:1px solid rgba(212,175,55,.20);
      color:#f2df99;
      font-size:12px;
      margin:4px 8px 0 0;
    }

    .roadmap{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0 16px}
    .step{flex:1 1 220px;display:flex;align-items:center;gap:10px;min-width:220px}
    .step-node{
      width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;
      font-weight:700;color:#fff;flex:0 0 auto;box-shadow:0 8px 18px rgba(0,0,0,.18)
    }
    .step.done .step-node{background:#0f172a}
    .step.current .step-node{background:#d4af37;color:#111}
    .step.pending .step-node{background:#6b7a90}
    .step-line{height:4px;flex:1;border-radius:999px;background:#40506a}
    .step.done .step-line{background:#0f172a}
    .step.current .step-line{background:#d4af37}
    .step-copy{
      background:linear-gradient(180deg, rgba(17,35,63,.96), rgba(10,21,39,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:14px;
      min-height:92px;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      box-shadow:0 6px 18px rgba(0,0,0,.18)
    }
    .step-copy strong{display:block;margin:0;font-size:15px;line-height:1.4;text-align:center;width:100%}

    .logo-wrap{text-align:center}
    .portal-logo{
      max-width:220px;
      width:100%;
      height:auto;
      display:block;
      margin:0 auto 14px;
      filter:none;
    }

    .helper-text{margin-top:8px;font-size:12px;color:#aebfdb}

    @media (max-width:900px){
      .grid,.check-grid{grid-template-columns:1fr}
      .wrap{padding:12px}
      .hero-inner,.card{padding:16px}
      .hero,.card{border-radius:18px}
      h1{font-size:24px}
    }
  </style>
</head>

  <div class="card">
    <div class="section-title"><h2>Personal Information</h2></div>
    <form id="appForm" class="grid">
      <div class="field"><label>Last Name</label><input id="lastName" required></div>
      <div class="field"><label>First Name</label><input id="firstName" required></div>
      <div class="field"><label>Middle Name (put blank if n/a)</label><input id="middleName"></div>
      <div class="field"><label>Date of Birth</label><input id="birthdate" type="date" required></div>
      <div class="field"><label>Age</label><input id="age" readonly></div>
      <div class="field">
        <label>Gender</label>
        <select id="gender" required>
          <option value=""></option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>
      <div class="field"><label>Contact Number</label><input id="contactNumber" required></div>
      <div class="field"><label>Email Address</label><input id="emailAddress" type="email" required></div>
      <div class="field"><label>Height (cm)</label><input id="heightCm" type="number" min="1" step="0.01" required></div>
      <div class="field"><label>Weight (kg)</label><input id="weightKg" type="number" min="1" step="0.01" required></div>
      <div class="field full"><label>BMI Result</label><input id="bmiValue" readonly></div>

      <div class="section-title full"><h2>Job Details</h2></div>
      <div class="field">
        <label>Position Applied for</label>
        <select id="positionApplied" required>
          <option value=""></option>
          <option>Dealer</option>
          <option>Pit Supervisor</option>
          <option>Pit Manager</option>
          <option>Operations Manager</option>
        </select>
      </div>

      <div class="field hidden" id="experienceField">
        <label>Dealer Experience Level</label>
        <select id="experienceLevel">
          <option value=""></option>
          <option>Experienced Dealer</option>
          <option>Non-Experienced Dealer</option>
        </select>
      </div>

      <div class="field full hidden" id="gamesField">
        <label>Games Handled (select at least 2 for Experienced Dealer)</label>
        <div class="check-grid">
          <label class="check-item"><input type="checkbox" name="games" value="MB"> MB</label>
          <label class="check-item"><input type="checkbox" name="games" value="RL"> RL</label>
          <label class="check-item"><input type="checkbox" name="games" value="BJ"> BJ</label>
          <label class="check-item"><input type="checkbox" name="games" value="CRAPS"> CRAPS</label>
        </div>
      </div>

      <div class="field">
        <label>Currently Employed</label>
        <select id="currentlyEmployed" required>
          <option value=""></option>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div class="field" id="currentCompanyField"><label>Current Company Name</label><input id="currentCompanyName"></div>
      <div class="field" id="currentPositionField"><label>Current Position</label><input id="currentPosition"></div>
      <div class="field hidden" id="previousCompanyField"><label>Previous Company Name (Put N/A if not Applicable) </label><input id="previousCompanyName"></div>

      <div class="field">
        <label>Preferred Other Department</label>
        <select id="preferredDepartment">
          <option value=""></option>

          <option>Slots</option>
          <option>Legal Services</option>
          <option>Gaming Project and Assets</option>
          <option>Business Development Junket Operations</option>
          <option>Membership Operations</option>
          
          <option>Call Center & Reservations</option>
          <option>Central Laundry</option>
          <option>Housekeeping Public Areas</option>
          <option>Gaming Treasury Operation</option>
          <option>Special Investigation Unit</option>
          <option>Resorts Security - QRF</option>
          <option>Finance</option>
          <option>Food and Beverage Operations</option>
          <option>Gaming Surveillance</option>
          <option>Anti Money Laundering Compliance Office</option>
          <option>Table Games Training</option>
          <option>Table Games Operations</option>
          <option>Business Development Operations Management</option>
          <option>VIP Host Operations</option>
          <option>Marketing</option>
          <option>Sales</option>
          <option>Facilities Management</option>
          <option>Security Control Unit</option>
          <option>Safety Environment Pollution Control</option>
          <option>Resorts Security - Facility Security</option>
          <option>Other</option>

        </select>
      </div>

      <div class="field full">
        <button type="submit" id="submitBtn">Submit Application</button>
        <div class="helper-text">Please review all details carefully before submitting.</div>
      </div>

    <div id="submitResult"></div>
  </div>

  <div class="card">
    <div class="section-title"><h2>Check My Status</h2></div>
    <div class="grid">
      <div class="field"><label>Reference Number</label><input id="trackRef"></div>
      <div class="field"><label>Date of Birth</label><input id="trackBirthdate" type="date"></div>
      <div class="field full">
        <button type="button" id="trackBtn" class="secondary-btn" onclick="trackStatus()">Check Status</button>
      </div>
    </div>
    <div id="trackerResult"></div>
  </div>
</div>

<script>
function byId(id){ return document.getElementById(id); }

function escapeHtml(str){
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function setMessage(id, html, type){
  const el = byId(id);
  el.innerHTML = '<div class="message ' + type + '">' + html + '</div>';
}

function hideMessage(id){
  const el = byId(id);
  el.innerHTML = '';
}

function computeAge(){
  const birthdate = byId('birthdate').value;
  if(!birthdate){ byId('age').value = ''; return; }
  const dob = new Date(birthdate + 'T00:00:00');
  if(isNaN(dob.getTime())){ byId('age').value = ''; return; }
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if(m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  byId('age').value = age >= 0 ? age : '';
}

function computeBMI(){
  const h = parseFloat(byId('heightCm').value || 0);
  const w = parseFloat(byId('weightKg').value || 0);
  if(!h || !w){ byId('bmiValue').value = ''; return; }
  const bmi = w / Math.pow(h / 100, 2);
  byId('bmiValue').value = bmi ? bmi.toFixed(2) : '';
}

function togglePositionFields(){
  const position = byId('positionApplied').value;
  const experienceField = byId('experienceField');
  const gamesField = byId('gamesField');
  const exp = byId('experienceLevel');

  if(position === 'Dealer'){
    experienceField.classList.remove('hidden');
  } else {
    experienceField.classList.add('hidden');
    exp.value = '';
    gamesField.classList.add('hidden');
    document.querySelectorAll('input[name="games"]').forEach(cb => cb.checked = false);
  }

  if(position === 'Dealer' && exp.value === 'Experienced Dealer'){
    gamesField.classList.remove('hidden');
  } else {
    gamesField.classList.add('hidden');
    if(exp.value !== 'Experienced Dealer'){
      document.querySelectorAll('input[name="games"]').forEach(cb => cb.checked = false);
    }
  }
}

function toggleEmploymentFields(){
  const employed = byId('currentlyEmployed').value;
  if(employed === 'Yes'){
    byId('currentCompanyField').classList.remove('hidden');
    byId('currentPositionField').classList.remove('hidden');
    byId('previousCompanyField').classList.add('hidden');
  } else if(employed === 'No'){
    byId('currentCompanyField').classList.add('hidden');
    byId('currentPositionField').classList.add('hidden');
    byId('previousCompanyField').classList.remove('hidden');
  } else {
    byId('currentCompanyField').classList.remove('hidden');
    byId('currentPositionField').classList.remove('hidden');
    byId('previousCompanyField').classList.add('hidden');
  }
}

byId('birthdate').addEventListener('change', computeAge);
byId('heightCm').addEventListener('input', computeBMI);
byId('weightKg').addEventListener('input', computeBMI);
byId('positionApplied').addEventListener('change', togglePositionFields);
byId('experienceLevel').addEventListener('change', togglePositionFields);
byId('currentlyEmployed').addEventListener('change', toggleEmploymentFields);

byId('appForm').addEventListener('submit', function(e){
  e.preventDefault();
  hideMessage('submitResult');

  const position = byId('positionApplied').value;
  const exp = byId('experienceLevel').value;
  const email = byId('emailAddress').value.trim();
  const btn = byId('submitBtn');
  const games = Array.from(document.querySelectorAll('input[name="games"]:checked')).map(cb => cb.value);

  if(position === 'Dealer' && !exp){
    setMessage('submitResult', 'Please select Dealer Experience Level.', 'error');
    return;
  }
  if(position === 'Dealer' && exp === 'Experienced Dealer' && games.length < 2){
    setMessage('submitResult', 'Please select at least 2 games for Experienced Dealer.', 'error');
    return;
  }

  const payload = {
    lastName: byId('lastName').value.trim(),
    firstName: byId('firstName').value.trim(),
    middleName: byId('middleName').value.trim(),
    birthdate: byId('birthdate').value,
    gender: byId('gender').value,
    contactNumber: byId('contactNumber').value.trim(),
    emailAddress: email,
    heightCm: byId('heightCm').value,
    weightKg: byId('weightKg').value,
    positionApplied: position,
    experienceLevel: exp,
    currentlyEmployed: byId('currentlyEmployed').value,
    currentCompanyName: byId('currentCompanyName').value.trim(),
    currentPosition: byId('currentPosition').value.trim(),
    previousCompanyName: byId('previousCompanyName').value.trim(),
    preferredDepartment: byId('preferredDepartment').value,
    games: games
  };

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  google.script.run
    .withSuccessHandler(function(res){
      setMessage(
        'submitResult',
        'Application submitted successfully.<br><br><strong>Reference Number:</strong> ' +
        escapeHtml(res.referenceNo || '') +
        '<br>Please save this reference number for status tracking.',
        'success'
      );
      byId('appForm').reset();
      byId('age').value = '';
      byId('bmiValue').value = '';
      togglePositionFields();
      toggleEmploymentFields();
      btn.disabled = false;
      btn.textContent = 'Submit Application';
    })
    .withFailureHandler(function(err){
      setMessage('submitResult', escapeHtml((err && err.message) ? err.message : 'An error occurred.'), 'error');
      btn.disabled = false;
      btn.textContent = 'Submit Application';
    })
    .submitApplication(payload);
});

function trackStatus(){
  hideMessage('trackerResult');
  const ref = byId('trackRef').value.trim();
  const dob = byId('trackBirthdate').value;
  const btn = byId('trackBtn');

  if(!ref || !dob){
    setMessage('trackerResult', 'Please enter both Reference Number and Date of Birth.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Checking...';

  google.script.run
    .withSuccessHandler(function(res){
      const applicant = res.applicant || {};
      const roadmap = Array.isArray(res.roadmap) ? res.roadmap : [];
      const pills = [
        '<span class="pill">Position: ' + escapeHtml(applicant.positionApplied || '-') + '</span>',
        '<span class="pill">Experience Level: ' + escapeHtml(applicant.experienceLevel || '-') + '</span>',
        '<span class="pill">Current Stage: ' + escapeHtml(applicant.currentStage || '-') + '</span>'
      ].join('');

      let roadmapHtml = '';
      if (roadmap.length) {
        roadmapHtml = '<div style="margin-top:14px"><strong>Application Status</strong></div><div class="roadmap">';
        roadmap.forEach(function(step, index){
          roadmapHtml += '<div class="step ' + escapeHtml(step.state || 'pending') + '">' +
            '<div class="step-node">' + escapeHtml(String(step.sequence || '')) + '</div>' +
            '<div class="step-copy"><div><strong>' + escapeHtml(step.stageName || '') + '</strong>' +
            (step.note ? '<div class="muted">' + escapeHtml(step.note) + '</div>' : '') +
            '</div></div>' +
            (index < roadmap.length - 1 ? '<div class="step-line"></div>' : '') +
            '</div>';
        });
        roadmapHtml += '</div>';
      }

      const instructionHtml = res.currentInstruction || res.latestNotification || '-';
      const html =
        '<div>' +
          '<div><strong>Applicant:</strong> ' + escapeHtml(((applicant.firstName || '') + ' ' + (applicant.lastName || '')).trim()) + '</div>' +
          '<div><strong>Reference Number:</strong> ' + escapeHtml(applicant.referenceNo || '-') + '</div>' +
          '<div style="margin-top:8px">' + pills + '</div>' +
          roadmapHtml +
          '<div style="margin-top:14px"><strong>Next Step Instruction:</strong><br>' + instructionHtml + '</div>' +
        '</div>';

      setMessage('trackerResult', html, 'info');
      btn.disabled = false;
      btn.textContent = 'Check Status';
    })
    .withFailureHandler(function(err){
      setMessage('trackerResult', escapeHtml((err && err.message) ? err.message : 'An error occurred.'), 'error');
      btn.disabled = false;
      btn.textContent = 'Check Status';
    })
    .getApplicantStatus(ref, dob);
}

togglePositionFields();
toggleEmploymentFields();
</script>
</body>
</html>
